<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Planning &amp; Feasibility Report — Phase 4</title>
<meta name="description" content="Proof-of-concept planning SOP, client intake, and an auto-generated technical feasibility report scoped to a narrow AI/model question.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231B1474'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B1474; --primary-dark: #120D52; --accent: #DCDDF6; --powder: #EEEEFA;
    --ink: #1c1c28; --muted: #5b5b6b; --line: #e4e4f0;
    --green: #1a8a5c; --amber: #d4790e; --red: #c0392b;
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--ink); background: #fafaff; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 44px 24px 36px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .crumb { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: var(--font-heading); font-weight: 700; font-size: 34px; line-height: 1.15; }
  .hero p { margin-top: 10px; font-size: 15.5px; color: #dcdcf2; max-width: 680px; }
  select#langSelect { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; padding: 7px 10px; }
  select#langSelect option { color: var(--ink); }
  main { max-width: 1000px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 26px; }
  .note strong { color: var(--primary); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); margin-bottom: 4px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 14px; }
  ol.sop { margin-left: 20px; }
  ol.sop li { margin-bottom: 10px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 10px 0 5px; }
  input[type=text], textarea, select.field { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 18px 20px; background: #fcfcff; font-size: 14px; }
  .preview h3 { font-family: var(--font-heading); color: var(--primary); font-size: 16px; margin: 14px 0 6px; }
  .preview h3:first-child { margin-top: 0; }
  .preview p { margin: 6px 0; white-space: pre-wrap; }
  .preview .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .verdict-badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; background: var(--accent); color: var(--primary); }
  .saved { font-size: 12.5px; color: var(--green); margin-left: 8px; }
  @media (max-width: 680px) { .grid2 { grid-template-columns: 1fr; } .hero h1 { font-size: 27px; } }
</style>
</head>
<body>
  <header class="hero"><div class="wrap">
    <div class="hero-top">
      <div class="crumb"><a href="../">AI Architect Toolkit</a> · Phase 4 · PoC &amp; Pilot</div>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="sv">Svenska</option>
      </select>
    </div>
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroDesc"></p>
  </div></header>

  <main>
    <div class="note"><strong data-i18n="noteLabel"></strong> <span data-i18n="noteBody"></span></div>

    <div class="card">
      <h2 data-i18n="sopTitle"></h2>
      <p class="hint" data-i18n="sopHint"></p>
      <ol class="sop" id="sopList"></ol>
    </div>

    <div class="card">
      <h2 data-i18n="intakeTitle"></h2>
      <div class="grid2">
        <div><label data-i18n="lblClient"></label><input type="text" data-eng="client" placeholder="Acme Corp"></div>
        <div><label data-i18n="lblAssessor"></label><input type="text" data-eng="assessor"></div>
      </div>
      <label data-i18n="lblObjective"></label>
      <textarea data-eng="objective" placeholder="What narrow technical question must this PoC answer?"></textarea>
      <label data-i18n="lblScope"></label>
      <textarea data-eng="scope"></textarea>
      <label data-i18n="lblOutOfScope"></label>
      <textarea data-eng="outOfScope" placeholder="Scalability, multi-scenario performance, system integration..."></textarea>
      <label data-i18n="lblSuccessCriteria"></label>
      <textarea data-eng="successCriteria"></textarea>
      <div class="grid2">
        <div><label data-i18n="lblTimeline"></label><input type="text" data-eng="timeline" placeholder="e.g. 3 weeks, starting Aug 4"></div>
        <div><label data-i18n="lblVerdict"></label>
          <select class="field" data-eng="verdict">
            <option value="">—</option>
            <option value="proceed" data-i18n-opt="verdictProceed"></option>
            <option value="iterate" data-i18n-opt="verdictIterate"></option>
            <option value="stop" data-i18n-opt="verdictStop"></option>
          </select>
        </div>
      </div>
      <label data-i18n="lblDemoEnv"></label>
      <textarea data-eng="demoEnv"></textarea>
    </div>

    <div class="card">
      <h2 data-i18n="previewTitle"></h2>
      <p class="hint" data-i18n="previewHint"></p>
      <div class="preview" id="preview"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportDoc('html')" data-i18n="btnExportHtml"></button>
        <button class="btn btn-primary" onclick="exportDoc('md')" data-i18n="btnExportMd"></button>
        <button class="btn btn-secondary" onclick="resetAll()" data-i18n="btnReset"></button>
        <span class="saved" id="savedFlag"></span>
      </div>
    </div>
  </main>

<script>
const KEY = 'aoa_poc_planning_v1';

const STRINGS = {
  en: {
    heroTitle: 'PoC Planning & Feasibility Report',
    heroDesc: 'SOP, client intake, and an auto-generated technical feasibility report — scoped to a narrow, timeboxed proof-of-concept question.',
    noteLabel: 'How this works.',
    noteBody: 'Fill in the intake fields below; the feasibility report preview builds live. No API calls — everything autosaves locally in your browser.',
    sopTitle: 'SOP — how this is usually done',
    sopHint: 'The order an architect actually works this exercise in.',
    sop: [
      'Define the narrow technical question the PoC must answer — which specific AI algorithm or model, against which specific problem — not a broader system question.',
      'Write explicit out-of-scope boundaries (scalability, multi-scenario performance, system integration) so the PoC cannot scope-creep into a pilot.',
      'Agree success criteria and pass/fail thresholds with technical and business stakeholders before any building starts.',

    previewHint: 'This is the actual deliverable — auto-generated and customized for this client.',
    btnExportHtml: '🌐 Export HTML',
    btnExportMd: '📄 Export Markdown',
    btnReset: '🔄 Reset',
    docTitle: 'PoC Technical Feasibility Report',
    docFor: 'Prepared for',
    docAssessor: 'Assessor',
    docDate: 'Date',
    secObjective: '1. Objective',
    secScope: '2. Scope',
    secOutOfScope: '3. Explicitly Out of Scope',
    secSuccess: '4. Success Criteria',
    secEnv: '5. Demo Environment',
    secTimeline: '6. Timeline',
    secVerdict: '7. Recommendation',
    emptyNote: '(not yet documented)',
  },
  da: {
    heroTitle: 'PoC-planlægning & Feasibility-rapport',
    heroDesc: 'SOP, kundeoptag, og en automatisk genereret teknisk feasibility-rapport — afgrænset til et smalt, tidsboxet proof-of-concept-spørgsmål.',
    noteLabel: 'Sådan virker det.',
    noteBody: 'Udfyld optagsfelterne nedenfor; feasibility-rapporten opbygges live. Ingen API-kald — alt gemmes automatisk lokalt i din browser.',
    sopTitle: 'SOP — sådan gøres det normalt',
    sopHint: 'Rækkefølgen en arkitekt reelt arbejder denne øvelse igennem.',
    sop: [
      'Definér det smalle tekniske spørgsmål, PoC\'en skal besvare — hvilken specifik AI-algoritme eller model, mod hvilket specifikt problem — ikke et bredere systemspørgsmål.',
      'Skriv eksplicitte out-of-scope-grænser (skalerbarhed, multi-scenarie-performance, systemintegration), så PoC\'en ikke kan glide over i et pilotprojekt.',
      'Aftal succeskriterier og bestå/ikke-bestå-tærskler med tekniske og forretningsmæssige interessenter, før byggeriet går i gang.',
      'Tidsboks arbejdet til ca. 2-4 uger og byg det minimale demomiljø, der er nødvendigt — repræsentative data, ikke nødvendigvis fuld skala.',
      'Afslut med en teknisk feasibility-rapport: hvad blev bevist, hvad blev ikke, og en anbefaling om at gå videre til Pilot, iterere, eller stoppe.',
    ],
    intakeTitle: 'Kunde- og PoC-optag',
    lblClient: 'Kunde / engagement',
    lblAssessor: 'Vurderingsmand',
    lblObjective: 'Mål — det smalle tekniske spørgsmål',
    lblScope: 'Inden for scope',
    lblOutOfScope: 'Eksplicit uden for scope',
    lblSuccessCriteria: 'Succeskriterier / bestå-ikke-bestå-tærskler',
    lblTimeline: 'Tidslinje',
    lblVerdict: 'Anbefaling',
    verdictProceed: 'Gå videre til Pilot',
    verdictIterate: 'Iterér PoC',
    verdictStop: 'Stop — ikke gennemførligt',
    lblDemoEnv: 'Demomiljø / anvendte data',
    previewTitle: 'Teknisk feasibility-rapport',
    previewHint: 'Dette er selve leverancen — automatisk genereret og tilpasset denne kunde.',
    btnExportHtml: '🌐 Eksportér HTML',
    btnExportMd: '📄 Eksportér Markdown',
    btnReset: '🔄 Nulstil',
    docTitle: 'PoC Teknisk Feasibility-rapport',
    docFor: 'Udarbejdet for',
    docAssessor: 'Vurderingsmand',
    docDate: 'Dato',
    secObjective: '1. Mål',
    secScope: '2. Scope',
    secOutOfScope: '3. Eksplicit uden for scope',
    secSuccess: '4. Succeskriterier',
    secEnv: '5. Demomiljø',
    secTimeline: '6. Tidslinje',
    secVerdict: '7. Anbefaling',
    emptyNote: '(endnu ikke dokumenteret)',
  },
  sv: {
    heroTitle: 'PoC-planering & Feasibility-rapport',
    heroDesc: 'SOP, kundintag, och en automatiskt genererad teknisk feasibility-rapport — avgränsad till en smal, tidsboxad proof-of-concept-fråga.',
    noteLabel: 'Så här fungerar det.',
    noteBody: 'Fyll i intagsfälten nedan; feasibility-rapporten byggs upp live. Inga API-anrop — allt sparas automatiskt lokalt i din webbläsare.',
    sopTitle: 'SOP — så här görs det vanligtvis',
    sopHint: 'Ordningen en arkitekt faktiskt arbetar igenom denna övning.',
    sop: [
      'Definiera den smala tekniska frågan PoC:en måste besvara — vilken specifik AI-algoritm eller modell, mot vilket specifikt problem — inte en bredare systemfråga.',
      'Skriv explicita out-of-scope-gränser (skalbarhet, multi-scenario-prestanda, systemintegration) så att PoC:en inte glider över i ett pilotprojekt.',
      'Kom överens om framgångskriterier och godkänt/underkänt-trösklar med tekniska och verksamhetsintressenter innan bygget börjar.',
      'Tidsboxa arbetet till ca 2-4 veckor och bygg den minsta demomiljö som behövs — representativa data, inte nödvändigtvis full skala.',
      'Avsluta med en teknisk feasibility-rapport: vad som bevisades, vad som inte gjorde det, och en rekommendation att gå vidare till Pilot, iterera, eller stoppa.',
    ],
    intakeTitle: 'Kund- och PoC-intag',
    lblClient: 'Kund / uppdrag',
    lblAssessor: 'Bedömare',
    lblObjective: 'Mål — den smala tekniska frågan',
    lblScope: 'Inom scope',
    lblOutOfScope: 'Explicit utanför scope',
    lblSuccessCriteria: 'Framgångskriterier / godkänt-underkänt-trösklar',
    lblTimeline: 'Tidslinje',
    lblVerdict: 'Rekommendation',
    verdictProceed: 'Gå vidare till Pilot',
    verdictIterate: 'Iterera PoC',
    verdictStop: 'Stoppa — ej genomförbart',
    lblDemoEnv: 'Demomiljö / använda data',
    previewTitle: 'Teknisk feasibility-rapport',
    previewHint: 'Detta är själva leveransen — automatiskt genererad och anpassad för denna kund.',
    btnExportHtml: '🌐 Exportera HTML',
    btnExportMd: '📄 Exportera Markdown',
    btnReset: '🔄 Återställ',
    docTitle: 'PoC Teknisk Feasibility-rapport',
    docFor: 'Framtagen för',
    docAssessor: 'Bedömare',
    docDate: 'Datum',
    secObjective: '1. Mål',
    secScope: '2. Scope',
    secOutOfScope: '3. Explicit utanför scope',
    secSuccess: '4. Framgångskriterier',
    secEnv: '5. Demomiljö',
    secTimeline: '6. Tidslinje',
    secVerdict: '7. Rekommendation',
    emptyNote: '(ännu inte dokumenterat)',
  },
};

let lang = localStorage.getItem('aoa_lang') || 'en';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : (STRINGS.en[key] !== undefined ? STRINGS.en[key] : key); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setLang(l) { lang = l; localStorage.setItem('aoa_lang', l); document.getElementById('langSelect').value = l; applyI18n(); renderPreview(); save(); }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-opt]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n-opt')); });
  document.title = t('heroTitle') + ' — Phase 4';
  document.getElementById('sopList').innerHTML = t('sop').map(s => `<li>${esc(s)}</li>`).join('');
}

function fieldEls() { return Array.from(document.querySelectorAll('[data-eng]')); }
function collect() { const o = {}; fieldEls().forEach(el => { o[el.getAttribute('data-eng')] = el.value; }); return o; }
function restore(o) { fieldEls().forEach(el => { const k = el.getAttribute('data-eng'); if (o[k] !== undefined) el.value = o[k]; }); }
let savedTimer;
function save() { try { localStorage.setItem(KEY, JSON.stringify({ fields: collect(), lang })); flashSaved(); } catch (e) {} }
function flashSaved() { const f = document.getElementById('savedFlag'); f.textContent = '✓'; clearTimeout(savedTimer); savedTimer = setTimeout(() => { f.textContent = ''; }, 1200); }
function loadSaved() { try { const o = JSON.parse(localStorage.getItem(KEY) || '{}'); if (o.fields) restore(o.fields); } catch (e) {} }

function val(k) { const el = document.querySelector(`[data-eng="${k}"]`); return el ? el.value : ''; }
function orEmpty(v) { return v && v.trim() ? esc(v) : `<em>${esc(t('emptyNote'))}</em>`; }
function verdictLabel(v) { return v === 'proceed' ? t('verdictProceed') : v === 'iterate' ? t('verdictIterate') : v === 'stop' ? t('verdictStop') : ''; }

function renderPreview() {
  const date = new Date().toISOString().slice(0, 10);
  let h = `<div class="meta"><strong>${esc(t('docFor'))}:</strong> ${esc(val('client')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docAssessor'))}:</strong> ${esc(val('assessor')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docDate'))}:</strong> ${date}</div>`;
  h += `<h3>${esc(t('secObjective'))}</h3><p>${orEmpty(val('objective'))}</p>`;
  h += `<h3>${esc(t('secScope'))}</h3><p>${orEmpty(val('scope'))}</p>`;
  h += `<h3>${esc(t('secOutOfScope'))}</h3><p>${orEmpty(val('outOfScope'))}</p>`;
  h += `<h3>${esc(t('secSuccess'))}</h3><p>${orEmpty(val('successCriteria'))}</p>`;
  h += `<h3>${esc(t('secEnv'))}</h3><p>${orEmpty(val('demoEnv'))}</p>`;
  h += `<h3>${esc(t('secTimeline'))}</h3><p>${esc(val('timeline')) || `<em>${esc(t('emptyNote'))}</em>`}</p>`;
  const verdict = val('verdict');
  h += `<h3>${esc(t('secVerdict'))}</h3><p>${verdict ? `<span class="verdict-badge">${esc(verdictLabel(verdict))}</span>` : `<em>${esc(t('emptyNote'))}</em>`}</p>`;
  document.getElementById('preview').innerHTML = h;
}

document.addEventListener('input', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });
document.addEventListener('change', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });

function resetAll() {
  if (!confirm('Clear all fields? / Ryd alle felter? / Rensa alla fält?')) return;
  fieldEls().forEach(el => { el.value = ''; });
  renderPreview();
  save();
}

function slug() { return (val('client') || 'poc_feasibility').replace(/\W+/g, '_'); }
function docMarkdown() {
  const date = new Date().toISOString().slice(0, 10);
  let m = `# ${t('docTitle')} — ${val('client') || '[client]'}\n\n`;
  m += `**${t('docFor')}:** ${val('client') || '—'}  \n**${t('docAssessor')}:** ${val('assessor') || '—'}  \n**${t('docDate')}:** ${date}\n\n`;
  m += `## ${t('secObjective')}\n${val('objective') || t('emptyNote')}\n\n`;
  m += `## ${t('secScope')}\n${val('scope') || t('emptyNote')}\n\n`;
  m += `## ${t('secOutOfScope')}\n${val('outOfScope') || t('emptyNote')}\n\n`;
  m += `## ${t('secSuccess')}\n${val('successCriteria') || t('emptyNote')}\n\n`;
  m += `## ${t('secEnv')}\n${val('demoEnv') || t('emptyNote')}\n\n`;
  m += `## ${t('secTimeline')}\n${val('timeline') || t('emptyNote')}\n\n`;
  m += `## ${t('secVerdict')}\n${verdictLabel(val('verdict')) || t('emptyNote')}\n`;
  return m;
}
function docHtml() {
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc(t('docTitle')) + ' — ' + esc(val('client') || 'client') + '</title>'
    + '<style>body{font-family:Inter,Segoe UI,sans-serif;color:#1c1c28;max-width:880px;margin:40px auto;padding:0 22px;line-height:1.6}'
    + 'h1,h3{color:#1B1474;font-family:Georgia,serif}</style></head><body>'
    + document.getElementById('preview').outerHTML.replace('id="preview"', '')
    + '</body></html>';
}
function download(text, fname, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname; a.click();
  URL.revokeObjectURL(a.href);
}
function exportDoc(fmt) {
  if (fmt === 'md') download(docMarkdown(), 'poc_feasibility_' + slug() + '.md', 'text/markdown');
  else download(docHtml(), 'poc_feasibility_' + slug() + '.html', 'text/html');
}

(function init() {
  document.getElementById('langSelect').value = lang;
  loadSaved();
  applyI18n();
  renderPreview();
})();
</script>
</body>
</html>
