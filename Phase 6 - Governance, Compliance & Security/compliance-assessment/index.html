<style>

  select#langSelect option { color: var(--ink); }
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  .note strong { color: var(--primary); }
  .note.warn { background: #fdf3e3; border-color: #f0d9ab; margin-bottom: 26px; }
  .note.warn strong { color: var(--amber); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); margin-bottom: 4px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 14px; }
  ol.sop { margin-left: 20px; }
  ol.sop li { margin-bottom: 10px; font-size: 14px; }
  ol.sop li.done > label.sop-step > span { text-decoration: line-through; color: var(--muted); }
  label.sop-step { display: flex; gap: 9px; align-items: flex-start; font-weight: 400; margin: 0; cursor: pointer; font-size: 14px; color: var(--ink); }
  label.sop-step input { width: auto; margin-top: 4px; flex: none; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 10px 0 5px; }
  input[type=text], textarea, select.field { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  table.matrix { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 10px; }
  table.matrix th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 6px 8px; border-bottom: 2px solid var(--line); }
  table.matrix td { padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.matrix input[type=text] { padding: 6px 8px; font-size: 13px; }
  table.matrix select { padding: 6px 6px; font-size: 13px; }
  .rm-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; }
  .status-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .status-compliant { background: #e7f5ee; color: var(--green); }
  .status-partial { background: #fdf3e3; color: var(--amber); }
  .status-gap { background: #fbeaea; color: var(--red); }
  .status-notassessed { background: var(--powder); color: var(--muted); }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 18px 20px; background: #fcfcff; font-size: 14px; }
  .preview h3 { font-family: var(--font-heading); color: var(--primary); font-size: 16px; margin: 14px 0 6px; }
  .preview h3:first-child { margin-top: 0; }
  .preview p { margin: 6px 0; white-space: pre-wrap; }
  .preview .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .preview th, .preview td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; }
  .preview th { background: var(--powder); color: var(--primary); }
  .prompt-box { display: none; margin-top: 12px; }
  pre.prompt { background: #f5f5fc; border: 1px solid var(--line); border-radius: 10px; padding: 14px; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #2a2a3a; max-height: 320px; overflow: auto; }
  .preview h2 { font-family: var(--font-heading); color: var(--primary); font-size: 18px; margin: 16px 0 6px; }
  .preview h4, .preview h5 { font-family: var(--font-heading); color: var(--primary); margin: 12px 0 4px; }
  .preview ul, .preview ol { margin: 8px 0 8px 22px; }
  .preview code { background: #ececf6; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  .preview pre { background: #f5f5fc; border: 1px solid var(--line); border-radius: 8px; padding: 12px; overflow: auto; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; margin: 10px 0; }

  .saved { font-size: 12.5px; color: var(--green); margin-left: 8px; }

      <p class="hint" data-i18n="draftHint"></p>

      <label data-i18n="lblDraftDoc"></label>
      <textarea data-eng="draftDoc" placeholder="Paste the Markdown document the agent drafted&#8230;"></textarea>
    </div>

    <div class="card">
      <h2 data-i18n="previewTitle"></h2>
      <p class="hint" data-i18n="previewHint"></p>
      <div class="preview" id="preview"></div>
      <div class="btn-row">

      </div>
      <div id="sampleError" style="display:none;color:var(--red);font-size:12.5px;margin-top:8px"></div>
    </div>
  </main>

function slug() { return (val('client') || 'compliance_gap_analysis').replace(/\W+/g, '_'); }

function download(text, fname, mime) {

// ── Agent drafting engine: prompt generation + Markdown paste-back.
// A non-empty draft replaces the echo template in preview and exports. ──
function _mdInline(s) { return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>'); }
function _mdRow(line) { return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim()); }
function mdToHtml(md) {
  if (!md || !md.trim()) return '';
  const L = md.replace(/\r/g, '').split('\n');
  let html = '', i = 0;
  while (i < L.length) {
    const line = L[i];
    if (/^\s*$/.test(line)) { i++; continue; }
    if (/^```/.test(line.trim())) {
      i++; const buf = [];
      while (i < L.length && !/^```/.test(L[i].trim())) { buf.push(L[i]); i++; }
      i++;
      html += '<pre>' + esc(buf.join('\n')) + '</pre>';
      continue;
    }
    if (line.includes('|') && i + 1 < L.length && /-/.test(L[i + 1]) && /^[\s:|-]+$/.test(L[i + 1].trim())) {
      const head = _mdRow(line); i += 2; const body = [];
      while (i < L.length && L[i].includes('|') && L[i].trim() !== '') { body.push(_mdRow(L[i])); i++; }
      html += '<table><thead><tr>' + head.map(h => '<th>' + _mdInline(h) + '</th>').join('') + '</tr></thead><tbody>'
            + body.map(r => '<tr>' + r.map(c => '<td>' + _mdInline(c) + '</td>').join('') + '</tr>').join('') + '</tbody></table>';
      continue;
    }
    let m;
    if (m = line.match(/^(#{1,4})\s+(.*)/)) { const lv = m[1].length + 1; html += '<h' + lv + '>' + _mdInline(m[2]) + '</h' + lv + '>'; i++; continue; }
    if (/^\s*[-*]\s+/.test(line)) { const it = []; while (i < L.length && /^\s*[-*]\s+/.test(L[i])) { it.push(L[i].replace(/^\s*[-*]\s+/, '')); i++; } html += '<ul>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { const it = []; while (i < L.length && /^\s*\d+\.\s+/.test(L[i])) { it.push(L[i].replace(/^\s*\d+\.\s+/, '')); i++; } html += '<ol>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ol>'; continue; }
    const para = [line]; i++;
    while (i < L.length && !/^\s*$/.test(L[i]) && !/^(#{1,4}\s|[-*]\s|\d+\.\s)/.test(L[i]) && !L[i].includes('|')) { para.push(L[i]); i++; }
    html += '<p>' + _mdInline(para.join(' ')) + '</p>';
  }
  return html;
}
function _humanizeKey(k) { return String(k).replace(/_/g, ' ').replace(/([a-z0-9])([A-Z])/g, '$1 $2').replace(/\b[a-z]/g, c => c.toUpperCase()).trim(); }
function buildDraftPrompt() {
  const title = STRINGS.en.docTitle || STRINGS.en.heroTitle;
  let p = 'You are an expert AI-architecture consultant. Draft the complete "' + title + '" deliverable for the engagement below as clean, client-ready Markdown.\n\n';
  p += "Methodology to follow (this tool's SOP):\n";
  (STRINGS.en.sop || []).forEach((s, i) => { p += (i + 1) + '. ' + s + '\n'; });
  p += "\nConsultant intake (verbatim \u2014 build on it, don't merely restate it):\n";
  document.querySelectorAll('[data-eng]').forEach(el => {
    const k = el.getAttribute('data-eng');
    if (k === 'draftDoc') return;
    const v = (el.type === 'checkbox') ? (el.checked ? 'yes' : '') : el.value;
    if (v && String(v).trim()) p += '- ' + _humanizeKey(k) + ': ' + v + '\n';
  });
  let rowsData = null;
  if (typeof rows !== 'undefined' && Array.isArray(rows) && rows.length) rowsData = rows;
  else if (typeof adrs !== 'undefined' && Array.isArray(adrs) && adrs.length) rowsData = adrs;
  if (rowsData) {
    const cleaned = rowsData.map(r => { const o = Object.assign({}, r); delete o.id; return o; })
      .filter(o => Object.keys(o).some(c => typeof o[c] === 'string' && o[c].trim() !== ''));
    if (cleaned.length) p += '\nStructured entries (JSON):\n' + JSON.stringify(cleaned, null, 2) + '\n';
  }
  if (typeof stackRows !== 'undefined' && Array.isArray(stackRows) && stackRows.length) {
    p += '\nImported architecture stack (JSON):\n' + JSON.stringify(stackRows, null, 2) + '\n';
  }
  p += '\nRequirements: professional consulting tone; expand thin inputs into complete, specific sections; never invent client facts \u2014 where information is missing, add it to a final "Open questions for the client" section; structure with clear Markdown headings; output only the document.';
  return p;
}
function genDraftPrompt() {

}
function copyDraftPrompt() {

}
