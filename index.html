function _numOnly(s) { return /^\d+(\.\d+)?$/.test(s.trim()); }
function _hasContent(v) {
  if (typeof v === 'string') return v.trim() !== '' && !_numOnly(v);
  if (Array.isArray(v)) return v.some(_hasContent);
  if (v && typeof v === 'object') return Object.keys(v).some(k => ['lang', 'nextId', 'id'].indexOf(k) === -1 && _hasContent(v[k]));
  return false;
}
// "Started" = has content beyond the shared client/assessor/useCase prefill.
function toolStarted(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return false;
    const o = JSON.parse(raw);
    if (o && o.picks && Object.keys(o.picks).length) return true;
    if (o && o.fields) {
      const f = Object.assign({}, o.fields);
      delete f.client; delete f.assessor; delete f.useCase;
      const rest = Object.assign({}, o, { fields: f });
      return _hasContent(rest);
    }
    const flat = Object.assign({}, o);
    delete flat.client; delete flat.assessor; delete flat.useCase;
    return _hasContent(flat);
  } catch (e) { return false; }
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderDashboard() {
  let eng = {};
  try { eng = JSON.parse(localStorage.getItem('aoa_engagement_v1') || '{}'); } catch (e) {}
  const started = TOOL_REGISTRY.filter(tl => toolStarted(tl.key)).length;
  const summary = document.getElementById('dashSummary');
  if (!eng.client && started === 0) {
    summary.textContent = t('dashNoEngagement');
  } else {
    const parts = [];
    if (eng.client) parts.push(t('dashClientPrefix') + ' ' + eng.client + (eng.useCase ? ' — ' + eng.useCase : ''));
    parts.push(t('dashProgress')(started, TOOL_REGISTRY.length));
    summary.textContent = parts.join(' · ');
  }
  document.getElementById('dashGrid').innerHTML = TOOL_REGISTRY.map(tl =>
    `<a class="dash-item" href="${tl.href}"><i class="dot ${toolStarted(tl.key) ? 'started' : 'empty'}"></i>${esc(t(tl.titleKey))}</a>`
  ).join('');
}

let lang = localStorage.getItem('aoa_lang') || 'en';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : (STRINGS.en[key] !== undefined ? STRINGS.en[key] : key); }
function setLang(l) { lang = l; localStorage.setItem('aoa_lang', l); document.getElementById('langSelect').value = l; applyI18n(); renderDashboard(); }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.documentElement.lang = lang;
}

(function init() {
  document.getElementById('langSelect').value = lang;
  applyI18n();
  renderDashboard();
})();
