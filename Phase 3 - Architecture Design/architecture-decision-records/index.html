<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231B1474'/%3E%3C/svg%3E">

<style>
  :root {
    --primary: #1B1474; --primary-dark: #120D52; --accent: #DCDDF6; --powder: #EEEEFA;
    --ink: #1c1c28; --muted: #5b5b6b; --line: #e4e4f0;
    --green: #1a8a5c; --amber: #d4790e; --red: #c0392b;
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--ink); background: #fafaff; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 44px 24px 36px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .crumb { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: var(--font-heading); font-weight: 700; font-size: 34px; line-height: 1.15; }
  .hero p { margin-top: 10px; font-size: 15.5px; color: #dcdcf2; max-width: 680px; }
  select#langSelect { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; padding: 7px 10px; }
  select#langSelect option { color: var(--ink); }
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 26px; }
  .note strong { color: var(--primary); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); margin-bottom: 4px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 14px; }
  ol.sop { margin-left: 20px; }
  ol.sop li { margin-bottom: 10px; font-size: 14px; }
  ol.sop li.done > label.sop-step > span { text-decoration: line-through; color: var(--muted); }
  label.sop-step { display: flex; gap: 9px; align-items: flex-start; font-weight: 400; margin: 0; cursor: pointer; font-size: 14px; color: var(--ink); }
  label.sop-step input { width: auto; margin-top: 4px; flex: none; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 10px 0 5px; }
  input[type=text], textarea, select.field { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; }
  textarea { resize: vertical; min-height: 55px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .adr-card { border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; position: relative; }
  .adr-card .adr-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
  .adr-id { font-family: var(--font-heading); font-weight: 700; color: var(--primary); font-size: 15px; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; text-transform: uppercase; }
  .status-proposed { background: var(--powder); color: var(--primary); }
  .status-accepted { background: #d7f0e3; color: var(--green); }
  .status-deprecated { background: #fbe3df; color: var(--red); }
  .status-superseded { background: #fbe8cf; color: var(--amber); }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 18px 20px; background: #fcfcff; font-size: 14px; }
  .preview h3 { font-family: var(--font-heading); color: var(--primary); font-size: 16px; margin: 14px 0 6px; }
  .preview h3:first-child { margin-top: 0; }
  .preview p { margin: 6px 0; white-space: pre-wrap; }
  .preview .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .prompt-box { display: none; margin-top: 12px; }
  pre.prompt { background: #f5f5fc; border: 1px solid var(--line); border-radius: 10px; padding: 14px; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #2a2a3a; max-height: 320px; overflow: auto; }
  .preview h2 { font-family: var(--font-heading); color: var(--primary); font-size: 18px; margin: 16px 0 6px; }
  .preview h4, .preview h5 { font-family: var(--font-heading); color: var(--primary); margin: 12px 0 4px; }
  .preview ul, .preview ol { margin: 8px 0 8px 22px; }
  .preview code { background: #ececf6; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  .preview pre { background: #f5f5fc; border: 1px solid var(--line); border-radius: 8px; padding: 12px; overflow: auto; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; margin: 10px 0; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .preview th, .preview td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; vertical-align: top; }
  .preview th { background: var(--powder); color: var(--primary); }
  textarea[data-eng="draftDoc"] { min-height: 110px; }
  .saved { font-size: 12.5px; color: var(--green); margin-left: 8px; }
  .rm-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; }
  @media (max-width: 680px) { .grid2 { grid-template-columns: 1fr; } .hero h1 { font-size: 27px; } }
</style>
</head>
<body>
  <header class="hero"><div class="wrap">
    <div class="hero-top">
      <div class="crumb"><a href="../">AI Architect Toolkit</a> · Phase 3 · Architecture Design</div>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="sv">Svenska</option>
      </select>
    </div>
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroDesc"></p>
  </div></header>

  <main>
    <div class="note"><strong data-i18n="noteLabel"></strong> <span data-i18n="noteBody"></span></div>

    <div class="card">
      <h2 data-i18n="sopTitle"></h2>
      <p class="hint" data-i18n="sopHint"></p>
      <ol class="sop" id="sopList"></ol>
      <p class="hint" id="sopProgress" style="margin:8px 0 0"></p>
    </div>

    <div class="card">
      <h2 data-i18n="clientTitle"></h2>
      <div class="grid2">
        <div><label data-i18n="lblClient"></label><input type="text" data-eng="client" placeholder="Acme Corp"></div>
        <div><label data-i18n="lblAssessor"></label><input type="text" data-eng="assessor"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="adrTitle"></h2>
      <p class="hint" data-i18n="adrHint"></p>
      <div id="adrList"></div>
      <div class="btn-row"><button class="btn btn-secondary" onclick="addAdr()" data-i18n="btnAddAdr"></button></div>
    </div>

    <div class="card">
      <h2 data-i18n="draftTitle"></h2>
      <p class="hint" data-i18n="draftHint"></p>
      <div class="btn-row"><button class="btn btn-primary" onclick="genDraftPrompt()" data-i18n="btnGenDraft"></button></div>
      <div class="prompt-box" id="pbDraft"><pre class="prompt" id="ptDraft"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyDraftPrompt()" data-i18n="btnCopyDraft"></button></div></div>
      <label data-i18n="lblDraftDoc"></label>
      <textarea data-eng="draftDoc" placeholder="Paste the Markdown document the agent drafted&#8230;"></textarea>
    </div>

    <div class="card">
      <h2 data-i18n="previewTitle"></h2>
      <p class="hint" data-i18n="previewHint"></p>
      <div class="preview" id="preview"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportDoc('html')" data-i18n="btnExportHtml"></button>
        <button class="btn btn-primary" onclick="exportDoc('md')" data-i18n="btnExportMd"></button>
        <button class="btn btn-secondary" onclick="resetAll()" data-i18n="btnReset"></button>
        <button class="btn btn-secondary" onclick="loadSample()" data-i18n="btnLoadSample"></button>
        <span class="saved" id="savedFlag"></span>
      </div>
      <div id="sampleError" style="display:none;color:var(--red);font-size:12.5px;margin-top:8px"></div>
    </div>
  </main>

let lang = localStorage.getItem('aoa_lang') || 'en';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : (STRINGS.en[key] !== undefined ? STRINGS.en[key] : key); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_KEYS = { proposed: 'statusProposed', accepted: 'statusAccepted', deprecated: 'statusDeprecated', superseded: 'statusSuperseded' };

function setLang(l) { lang = l; localStorage.setItem('aoa_lang', l); document.getElementById('langSelect').value = l; applyI18n(); renderAdrs(); renderPreview(); save(); }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.title = t('heroTitle') + ' — Phase 3';
  document.getElementById('sopList').innerHTML = t('sop').map(s => `<li>${esc(s)}</li>`).join('');
}

function fieldEls() { return Array.from(document.querySelectorAll('[data-eng]')); }
function collectFields() { const o = {}; fieldEls().forEach(el => { o[el.getAttribute('data-eng')] = el.value; }); return o; }
function restoreFields(o) { fieldEls().forEach(el => { const k = el.getAttribute('data-eng'); if (o[k] !== undefined) el.value = o[k]; }); }
function val(k) { const el = document.querySelector(`[data-eng="${k}"]`); return el ? el.value : ''; }

let savedTimer;
function save() { try { localStorage.setItem(KEY, JSON.stringify({ fields: collectFields(), adrs, nextId, lang })); flashSaved(); } catch (e) {} }
function flashSaved() { const f = document.getElementById('savedFlag'); f.textContent = '✓'; clearTimeout(savedTimer); savedTimer = setTimeout(() => { f.textContent = ''; }, 1200); }
function loadSaved() {
  try {
    const o = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (o.fields) restoreFields(o.fields);
    if (o.adrs) adrs = o.adrs;
    if (o.nextId) nextId = o.nextId;
  } catch (e) {}
}

function addAdr() { adrs.push({ id: nextId++, title: '', status: 'proposed', context: '', decision: '', consequences: '' }); renderAdrs(); renderPreview(); save(); }
function removeAdr(id) { adrs = adrs.filter(a => a.id !== id); renderAdrs(); renderPreview(); save(); }
function updateAdr(id, field, value) { const a = adrs.find(a => a.id === id); if (a) a[field] = value; renderPreview(); save(); if (field === 'status') renderAdrs(); }

function renderAdrs() {
  const list = document.getElementById('adrList');
  if (!adrs.length) { list.innerHTML = `<p style="color:var(--muted);font-style:italic">${esc(t('noAdrs'))}</p>`; return; }
  list.innerHTML = adrs.map((a, i) => {
    const num = String(i + 1).padStart(3, '0');
    return `<div class="adr-card">
      <div class="adr-head">
        <span class="adr-id">ADR-${num}</span>
        <button class="rm-btn" onclick="removeAdr(${a.id})">✕</button>
      </div>
      <label>${esc(t('lblTitle'))}</label>
      <input type="text" value="${esc(a.title)}" placeholder="${esc(t('placeholderTitle'))}" oninput="updateAdr(${a.id},'title',this.value)">
      <label>${esc(t('lblStatus'))}</label>
      <select onchange="updateAdr(${a.id},'status',this.value)">
        ${Object.entries(STATUS_KEYS).map(([v, k]) => `<option value="${v}" ${a.status === v ? 'selected' : ''}>${esc(t(k))}</option>`).join('')}
      </select>
      <label>${esc(t('lblContext'))}</label>
      <textarea oninput="updateAdr(${a.id},'context',this.value)">${esc(a.context)}</textarea>
      <label>${esc(t('lblDecision'))}</label>
      <textarea oninput="updateAdr(${a.id},'decision',this.value)">${esc(a.decision)}</textarea>
      <label>${esc(t('lblConsequences'))}</label>
      <textarea oninput="updateAdr(${a.id},'consequences',this.value)">${esc(a.consequences)}</textarea>
    </div>`;
  }).join('');
}

function renderPreview() {
  const date = new Date().toISOString().slice(0, 10);
  let h = `<div class="meta"><strong>${esc(t('docFor'))}:</strong> ${esc(val('client')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docAssessor'))}:</strong> ${esc(val('assessor')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docDate'))}:</strong> ${date}</div>`;
  const filled = adrs.filter(a => a.title.trim());
  if (!filled.length) { h += `<p><em>${esc(t('noAdrs'))}</em></p>`; }
  else {
    filled.forEach((a, i) => {
      const num = String(i + 1).padStart(3, '0');
      const statusLabel = t(STATUS_KEYS[a.status] || 'statusProposed');
      h += `<h3>ADR-${num}: ${esc(a.title)} <span class="status-badge status-${a.status}">${esc(statusLabel)}</span></h3>`;
      h += `<p><strong>${esc(t('lblContext'))}:</strong> ${esc(a.context) || '—'}</p>`;
      h += `<p><strong>${esc(t('lblDecision'))}:</strong> ${esc(a.decision) || '—'}</p>`;
      h += `<p><strong>${esc(t('lblConsequences'))}:</strong> ${esc(a.consequences) || '—'}</p>`;
    });
  }
  document.getElementById('preview').innerHTML = h;
}

document.addEventListener('input', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });
document.addEventListener('change', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });

function resetAll() {
  if (!confirm('Clear all fields? / Ryd alle felter? / Rensa alla fält?')) return;
  fieldEls().forEach(el => { el.value = ''; });
  adrs = []; nextId = 1;
  renderAdrs(); renderPreview(); save();
}

function slug() { return (val('client') || 'adr').replace(/\W+/g, '_'); }
function docMarkdown() {
  const date = new Date().toISOString().slice(0, 10);
  const filled = adrs.filter(a => a.title.trim());
  let m = `# ${t('docTitle')} — ${val('client') || '[client]'}\n\n`;
  m += `**${t('docFor')}:** ${val('client') || '—'}  \n**${t('docAssessor')}:** ${val('assessor') || '—'}  \n**${t('docDate')}:** ${date}\n\n`;
  if (!filled.length) { m += `${t('noAdrs')}\n`; }
  else {
    filled.forEach((a, i) => {
      const num = String(i + 1).padStart(3, '0');
      const statusLabel = t(STATUS_KEYS[a.status] || 'statusProposed');
      m += `## ADR-${num}: ${a.title} (${statusLabel})\n\n`;
      m += `**${t('lblContext')}:** ${a.context || '—'}  \n`;
      m += `**${t('lblDecision')}:** ${a.decision || '—'}  \n`;
      m += `**${t('lblConsequences')}:** ${a.consequences || '—'}\n\n`;
    });
  }
  return m;
}
function docHtml() {
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc(t('docTitle')) + ' — ' + esc(val('client') || 'client') + '</title>'
    + '<style>body{font-family:Inter,Segoe UI,sans-serif;color:#1c1c28;max-width:880px;margin:40px auto;padding:0 22px;line-height:1.6}'
    + 'h1,h3{color:#1B1474;font-family:Georgia,serif}.status-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;background:#EEEEFA;color:#1B1474;margin-left:8px}</style></head><body>'
    + document.getElementById('preview').outerHTML.replace('id="preview"', '')
    + '</body></html>';
}
function download(text, fname, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname; a.click();
  URL.revokeObjectURL(a.href);
}
function exportDoc(fmt) {
  if (fmt === 'md') download(docMarkdown(), 'adr_' + slug() + '.md', 'text/markdown');
  else download(docHtml(), 'adr_' + slug() + '.html', 'text/html');
}

// ── Shared engagement profile (site-wide prefill of client/assessor/use case) ──
const ENG_KEY = 'aoa_engagement_v1';
const ENG_FIELDS = ['client', 'assessor', 'useCase'];
function prefillEngagement() {
  try {
    const eng = JSON.parse(localStorage.getItem(ENG_KEY) || '{}');
    ENG_FIELDS.forEach(k => {
      const el = document.querySelector('[data-eng="' + k + '"]');
      if (el && !el.value && eng[k]) el.value = eng[k];
    });
  } catch (e) {}
}
document.addEventListener('input', e => {
  const k = e.target.getAttribute && e.target.getAttribute('data-eng');
  if (!k || ENG_FIELDS.indexOf(k) === -1 || !e.target.value) return;
  try {
    const eng = JSON.parse(localStorage.getItem(ENG_KEY) || '{}');
    eng[k] = e.target.value;
    localStorage.setItem(ENG_KEY, JSON.stringify(eng));
  } catch (e2) {}
});

// ── Agent drafting engine: prompt generation + Markdown paste-back.
// A non-empty draft replaces the echo template in preview and exports. ──
function _mdInline(s) { return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>'); }
function _mdRow(line) { return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim()); }
function mdToHtml(md) {
  if (!md || !md.trim()) return '';
  const L = md.replace(/\r/g, '').split('\n');
  let html = '', i = 0;
  while (i < L.length) {
    const line = L[i];
    if (/^\s*$/.test(line)) { i++; continue; }
    if (/^```/.test(line.trim())) {
      i++; const buf = [];
      while (i < L.length && !/^```/.test(L[i].trim())) { buf.push(L[i]); i++; }
      i++;
      html += '<pre>' + esc(buf.join('\n')) + '</pre>';
      continue;
    }
    if (line.includes('|') && i + 1 < L.length && /-/.test(L[i + 1]) && /^[\s:|-]+$/.test(L[i + 1].trim())) {
      const head = _mdRow(line); i += 2; const body = [];
      while (i < L.length && L[i].includes('|') && L[i].trim() !== '') { body.push(_mdRow(L[i])); i++; }
      html += '<table><thead><tr>' + head.map(h => '<th>' + _mdInline(h) + '</th>').join('') + '</tr></thead><tbody>'
            + body.map(r => '<tr>' + r.map(c => '<td>' + _mdInline(c) + '</td>').join('') + '</tr>').join('') + '</tbody></table>';
      continue;
    }
    let m;
    if (m = line.match(/^(#{1,4})\s+(.*)/)) { const lv = m[1].length + 1; html += '<h' + lv + '>' + _mdInline(m[2]) + '</h' + lv + '>'; i++; continue; }
    if (/^\s*[-*]\s+/.test(line)) { const it = []; while (i < L.length && /^\s*[-*]\s+/.test(L[i])) { it.push(L[i].replace(/^\s*[-*]\s+/, '')); i++; } html += '<ul>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { const it = []; while (i < L.length && /^\s*\d+\.\s+/.test(L[i])) { it.push(L[i].replace(/^\s*\d+\.\s+/, '')); i++; } html += '<ol>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ol>'; continue; }
    const para = [line]; i++;
    while (i < L.length && !/^\s*$/.test(L[i]) && !/^(#{1,4}\s|[-*]\s|\d+\.\s)/.test(L[i]) && !L[i].includes('|')) { para.push(L[i]); i++; }
    html += '<p>' + _mdInline(para.join(' ')) + '</p>';
  }
  return html;
}
function _humanizeKey(k) { return String(k).replace(/_/g, ' ').replace(/([a-z0-9])([A-Z])/g, '$1 $2').replace(/\b[a-z]/g, c => c.toUpperCase()).trim(); }
function buildDraftPrompt() {
  const title = STRINGS.en.docTitle || STRINGS.en.heroTitle;
  let p = 'You are an expert AI-architecture consultant. Draft the complete "' + title + '" deliverable for the engagement below as clean, client-ready Markdown.\n\n';
  p += "Methodology to follow (this tool's SOP):\n";
  (STRINGS.en.sop || []).forEach((s, i) => { p += (i + 1) + '. ' + s + '\n'; });
  p += "\nConsultant intake (verbatim \u2014 build on it, don't merely restate it):\n";
  document.querySelectorAll('[data-eng]').forEach(el => {
    const k = el.getAttribute('data-eng');
    if (k === 'draftDoc') return;
    const v = (el.type === 'checkbox') ? (el.checked ? 'yes' : '') : el.value;
    if (v && String(v).trim()) p += '- ' + _humanizeKey(k) + ': ' + v + '\n';
  });
  let rowsData = null;
  if (typeof rows !== 'undefined' && Array.isArray(rows) && rows.length) rowsData = rows;
  else if (typeof adrs !== 'undefined' && Array.isArray(adrs) && adrs.length) rowsData = adrs;
  if (rowsData) {
    const cleaned = rowsData.map(r => { const o = Object.assign({}, r); delete o.id; return o; })
      .filter(o => Object.keys(o).some(c => typeof o[c] === 'string' && o[c].trim() !== ''));
    if (cleaned.length) p += '\nStructured entries (JSON):\n' + JSON.stringify(cleaned, null, 2) + '\n';
  }
  if (typeof stackRows !== 'undefined' && Array.isArray(stackRows) && stackRows.length) {
    p += '\nImported architecture stack (JSON):\n' + JSON.stringify(stackRows, null, 2) + '\n';
  }
  p += '\nRequirements: professional consulting tone; expand thin inputs into complete, specific sections; never invent client facts \u2014 where information is missing, add it to a final "Open questions for the client" section; structure with clear Markdown headings; output only the document.';
  return p;
}
function genDraftPrompt() {
  document.getElementById('ptDraft').textContent = buildDraftPrompt();
  document.getElementById('pbDraft').style.display = 'block';
}
function copyDraftPrompt() {
  const txt = document.getElementById('ptDraft').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target; const o = btn.textContent;
    btn.textContent = t('draftCopied'); setTimeout(() => { btn.textContent = o; }, 1800);
  }).catch(() => alert(t('draftCopyFail')));
}
const _tplRenderPreview = renderPreview;
renderPreview = function () {
  const d = val('draftDoc');
  if (d && d.trim()) document.getElementById('preview').innerHTML = mdToHtml(d);
  else _tplRenderPreview();
};
const _tplDocMarkdown = docMarkdown;
docMarkdown = function () {
  const d = val('draftDoc');
  return (d && d.trim()) ? d : _tplDocMarkdown();
};
const _tplDocHtml = docHtml;
docHtml = function () {
  const d = val('draftDoc');
  if (!(d && d.trim())) return _tplDocHtml();
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc((STRINGS.en.docTitle || '') + ' \u2014 ' + (val('client') || 'client')) + '</title>'
    + '<style>body{font-family:Inter,Segoe UI,sans-serif;color:#1c1c28;max-width:880px;margin:40px auto;padding:0 22px;line-height:1.6}'
    + 'h1,h2,h3,h4{color:#1B1474;font-family:Georgia,serif}table{width:100%;border-collapse:collapse;font-size:14px;margin:12px 0}th,td{border:1px solid #e4e4f0;padding:7px 10px;text-align:left;vertical-align:top}th{background:#EEEEFA;color:#1B1474}'
    + 'code{background:#ececf6;padding:1px 5px;border-radius:4px}pre{background:#f5f5fc;border:1px solid #e4e4f0;border-radius:8px;padding:12px;overflow:auto;font-size:12.5px}</style></head><body>'
    + mdToHtml(d) + '</body></html>';
};

// ── Checkable SOP steps (persisted) + sample-engagement loader ───
let sopDone = [];
try { const _o0 = JSON.parse(localStorage.getItem(KEY) || '{}'); if (Array.isArray(_o0.sopDone)) sopDone = _o0.sopDone; } catch (e) {}
function renderSop() {
  const steps = t('sop');
  document.getElementById('sopList').innerHTML = steps.map((s, i) =>
    `<li class="${sopDone[i] ? 'done' : ''}"><label class="sop-step"><input type="checkbox" ${sopDone[i] ? 'checked' : ''} onchange="toggleSop(${i}, this.checked)"><span>${esc(s)}</span></label></li>`
  ).join('');
  const pl = document.getElementById('sopProgress');
  if (pl) pl.textContent = t('sopProgress')(sopDone.filter(Boolean).length, steps.length);
}
function toggleSop(i, v) { sopDone[i] = v; renderSop(); save(); }
const _sopSave = save;
save = function () {
  _sopSave();
  try {
    const o = JSON.parse(localStorage.getItem(KEY) || '{}');
    o.sopDone = sopDone;
    localStorage.setItem(KEY, JSON.stringify(o));
  } catch (e) {}
};
const _sopApplyI18n = applyI18n;
applyI18n = function () { _sopApplyI18n(); renderSop(); };
const SAMPLE_URL = '../../Phase%201%20-%20Discovery%20%26%20Assessment/sample-data/engagement-nordkap/architecture-decision-records.json';
function loadSample() {
  if (!confirm(t('sampleConfirm'))) return;
  const errEl = document.getElementById('sampleError');
  if (errEl) errEl.style.display = 'none';
  fetch(SAMPLE_URL)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(o => { localStorage.setItem(KEY, JSON.stringify(o)); location.reload(); })
    .catch(err => {
      if (errEl) { errEl.textContent = t('sampleLoadError2')(err.message); errEl.style.display = 'block'; }
    });
}

(function init() {
  document.getElementById('langSelect').value = lang;
  loadSaved();
  prefillEngagement();
  applyI18n();
  if (!adrs.length) { adrs.push({ id: nextId++, title: '', status: 'proposed', context: '', decision: '', consequences: '' }); }
  renderAdrs();
  renderPreview();
})();
</script>
