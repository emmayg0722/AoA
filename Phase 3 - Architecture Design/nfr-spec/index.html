<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Functional Requirements Spec — Phase 3</title>
<meta name="description" content="NFR SOP, a scorable requirements matrix, and an auto-generated non-functional requirements specification document.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231B1474'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B1474; --primary-dark: #120D52; --accent: #DCDDF6; --powder: #EEEEFA;
    --ink: #1c1c28; --muted: #5b5b6b; --line: #e4e4f0;
    --green: #1a8a5c; --amber: #d4790e; --red: #c0392b;
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--ink); background: #fafaff; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 44px 24px 36px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .crumb { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: var(--font-heading); font-weight: 700; font-size: 34px; line-height: 1.15; }
  .hero p { margin-top: 10px; font-size: 15.5px; color: #dcdcf2; max-width: 680px; }
  select#langSelect { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; padding: 7px 10px; }
  select#langSelect option { color: var(--ink); }
  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 26px; }
  .note strong { color: var(--primary); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); margin-bottom: 4px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 14px; }
  ol.sop { margin-left: 20px; }
  ol.sop li { margin-bottom: 10px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 10px 0 5px; }
  input[type=text], select.field { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; }
  input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  table.matrix { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 10px; }
  table.matrix th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 6px 8px; border-bottom: 2px solid var(--line); }
  table.matrix td { padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.matrix input[type=text] { padding: 6px 8px; font-size: 13px; }
  table.matrix select { padding: 6px 6px; font-size: 13px; }
  .prio-badge { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; white-space: nowrap; }
  .prio-must { background: #fbe3df; color: var(--red); }
  .prio-should { background: #fbe8cf; color: var(--amber); }
  .prio-could { background: var(--powder); color: var(--primary); }
  .rm-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 15px; }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 18px 20px; background: #fcfcff; font-size: 14px; }
  .preview h3 { font-family: var(--font-heading); color: var(--primary); font-size: 16px; margin: 14px 0 6px; }
  .preview h3:first-child { margin-top: 0; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .preview th, .preview td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; }
  .preview th { background: var(--powder); color: var(--primary); }
  .preview .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .saved { font-size: 12.5px; color: var(--green); margin-left: 8px; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } .hero h1 { font-size: 27px; } table.matrix { font-size: 12px; } }
</style>
</head>
<body>
  <header class="hero"><div class="wrap">
    <div class="hero-top">
      <div class="crumb"><a href="../">AI Architect Toolkit</a> · Phase 3 · Architecture Design</div>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="sv">Svenska</option>
      </select>
    </div>
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroDesc"></p>
  </div></header>

  <main>
    <div class="note"><strong data-i18n="noteLabel"></strong> <span data-i18n="noteBody"></span></div>

    <div class="card">
      <h2 data-i18n="sopTitle"></h2>
      <p class="hint" data-i18n="sopHint"></p>
      <ol class="sop" id="sopList"></ol>
    </div>

    <div class="card">
      <h2 data-i18n="clientTitle"></h2>
      <div class="grid2">
        <div><label data-i18n="lblClient"></label><input type="text" data-eng="client" placeholder="Acme Corp"></div>
        <div><label data-i18n="lblAssessor"></label><input type="text" data-eng="assessor"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="matrixTitle"></h2>
      <p class="hint" data-i18n="matrixHint"></p>
      <table class="matrix">
        <thead><tr>
          <th data-i18n="colCategory"></th><th data-i18n="colRequirement"></th>
          <th data-i18n="colTarget"></th><th data-i18n="colPriority"></th><th></th>
        </tr></thead>
        <tbody id="matrixBody"></tbody>
      </table>
      <div class="btn-row"><button class="btn btn-secondary" onclick="addRow()" data-i18n="btnAddRow"></button></div>
    </div>

    <div class="card">
      <h2 data-i18n="previewTitle"></h2>
      <p class="hint" data-i18n="previewHint"></p>
      <div class="preview" id="preview"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportDoc('html')" data-i18n="btnExportHtml"></button>
        <button class="btn btn-primary" onclick="exportDoc('md')" data-i18n="btnExportMd"></button>
        <button class="btn btn-secondary" onclick="resetAll()" data-i18n="btnReset"></button>
        <span class="saved" id="savedFlag"></span>
      </div>
    </div>
  </main>

<script>
const KEY = 'aoa_nfr_spec_v1';
const CATEGORIES = ['Performance', 'Availability', 'Scalability', 'Security', 'Compliance', 'Usability'];
const PRIORITIES = { must: 'prioMust', should: 'prioShould', could: 'prioCould' };

const STRINGS = {
  en: {
    heroTitle: 'Non-Functional Requirements Spec',
    heroDesc: 'SOP, a scorable requirements matrix, and an auto-generated NFR specification document.',
    noteLabel: 'How this works.',
    noteBody: 'Add one row per non-functional requirement; the specification document builds live. No API calls — everything autosaves locally.',
    sopTitle: 'SOP — how this is usually done',
    sopHint: 'The order an architect actually works this exercise in.',
    sop: [
      'Derive NFRs from the target use case, not from a generic template — a chatbot and a real-time fraud model have almost nothing in common here.',
      'Make every requirement measurable — "fast" is not a requirement, "p99 latency under 200ms" is.',
      'Cover the full set: performance, availability, scalability, security, compliance, and usability — gaps here surface as production incidents later.',
      'Prioritize with MoSCoW (Must/Should/Could) so Phase 4 PoC scope can be negotiated against something concrete.',
      'Circulate for sign-off — NFRs are as binding as functional requirements, and are usually the ones that get skipped under time pressure.',
    ],
    clientTitle: 'Client',
    lblClient: 'Client / engagement',
    lblAssessor: 'Assessor',
    matrixTitle: 'Requirements matrix',
    matrixHint: 'Add each non-functional requirement, its measurable target, and priority.',
    colCategory: 'Category',
    colRequirement: 'Requirement',
    colTarget: 'Target / threshold',
    colPriority: 'Priority',
    prioMust: 'Must',
    prioShould: 'Should',
    prioCould: 'Could',
    btnAddRow: '+ Add requirement',
    previewTitle: 'NFR specification document',
    previewHint: 'This is the actual deliverable — the requirements matrix, auto-generated and customized for this client.',
    btnExportHtml: '🌐 Export HTML',
    btnExportMd: '📄 Export Markdown',
    btnReset: '🔄 Reset',
    docTitle: 'Non-Functional Requirements Specification',
    docFor: 'Prepared for',
    docAssessor: 'Assessor',
    docDate: 'Date',
    noRows: 'No requirements added yet.',
    placeholderRequirement: 'e.g. API response time',
    placeholderTarget: 'e.g. p99 < 200ms',
  },
  da: {
    heroTitle: 'Ikke-funktionel kravspecifikation',
    heroDesc: 'SOP, en scorbar kravmatrix, og en automatisk genereret NFR-specifikationsdokument.',
    noteLabel: 'Sådan virker det.',
    noteBody: 'Tilføj en række pr. ikke-funktionelt krav; specifikationsdokumentet opbygges live. Ingen API-kald — alt gemmes automatisk lokalt.',
    sopTitle: 'SOP — sådan gøres det normalt',
    sopHint: 'Rækkefølgen en arkitekt reelt arbejder denne øvelse igennem.',
    sop: [
      'Udled NFR\'er fra målanvendelsen, ikke fra en generisk skabelon — en chatbot og en realtids-svindelmodel har næsten intet til fælles her.',
      'Gør hvert krav målbart — "hurtig" er ikke et krav, "p99-latenstid under 200ms" er.',
      'Dæk hele sættet: ydeevne, tilgængelighed, skalerbarhed, sikkerhed, compliance og brugervenlighed — huller her dukker op som produktionshændelser senere.',
      'Prioritér med MoSCoW (Must/Should/Could), så Phase 4 PoC-omfanget kan forhandles mod noget konkret.',
      'Cirkulér til godkendelse — NFR\'er er lige så bindende som funktionelle krav, og er normalt dem, der springes over under tidspres.',
    ],
    clientTitle: 'Kunde',
    lblClient: 'Kunde / engagement',
    lblAssessor: 'Vurderingsmand',
    matrixTitle: 'Kravmatrix',
    matrixHint: 'Tilføj hvert ikke-funktionelt krav, dets målbare mål og prioritet.',
    colCategory: 'Kategori',
    colRequirement: 'Krav',
    colTarget: 'Mål / tærskel',
    colPriority: 'Prioritet',
    prioMust: 'Skal',
    prioShould: 'Bør',
    prioCould: 'Kan',
    btnAddRow: '+ Tilføj krav',
    previewTitle: 'NFR-specifikationsdokument',
    previewHint: 'Dette er selve leverancen — kravmatrixen, automatisk genereret og tilpasset denne kunde.',
    btnExportHtml: '🌐 Eksportér HTML',
    btnExportMd: '📄 Eksportér Markdown',
    btnReset: '🔄 Nulstil',
    docTitle: 'Ikke-funktionel Kravspecifikation',
    docFor: 'Udarbejdet for',
    docAssessor: 'Vurderingsmand',
    docDate: 'Dato',
    noRows: 'Ingen krav tilføjet endnu.',
    placeholderRequirement: 'fx API-svartid',
    placeholderTarget: 'fx p99 < 200ms',
  },
  sv: {
    heroTitle: 'Icke-funktionell Kravspecifikation',
    heroDesc: 'SOP, en poängsatt kravmatris, och ett automatiskt genererat NFR-specifikationsdokument.',
    noteLabel: 'Så här fungerar det.',
    noteBody: 'Lägg till en rad per icke-funktionellt krav; specifikationsdokumentet byggs upp live. Inga API-anrop — allt sparas automatiskt lokalt.',
    sopTitle: 'SOP — så här görs det vanligtvis',
    sopHint: 'Ordningen en arkitekt faktiskt arbetar igenom denna övning.',
    sop: [
      'Härled NFR:er från målanvändningsfallet, inte från en generisk mall — en chattbot och en realtids-bedrägerimodell har nästan inget gemensamt här.',
      'Gör varje krav mätbart — "snabb" är inte ett krav, "p99-latens under 200ms" är.',
      'Täck hela uppsättningen: prestanda, tillgänglighet, skalbarhet, säkerhet, efterlevnad och användbarhet — luckor här dyker upp som produktionsincidenter senare.',
      'Prioritera med MoSCoW (Must/Should/Could) så att Fas 4 PoC-omfattningen kan förhandlas mot något konkret.',
      'Cirkulera för godkännande — NFR:er är lika bindande som funktionella krav, och är oftast de som hoppas över under tidspress.',
    ],
    clientTitle: 'Kund',
    lblClient: 'Kund / uppdrag',
    lblAssessor: 'Bedömare',
    matrixTitle: 'Kravmatris',
    matrixHint: 'Lägg till varje icke-funktionellt krav, dess mätbara mål och prioritet.',
    colCategory: 'Kategori',
    colRequirement: 'Krav',
    colTarget: 'Mål / tröskelvärde',
    colPriority: 'Prioritet',
    prioMust: 'Måste',
    prioShould: 'Bör',
    prioCould: 'Kan',
    btnAddRow: '+ Lägg till krav',
    previewTitle: 'NFR-specifikationsdokument',
    previewHint: 'Detta är själva leveransen — kravmatrisen, automatiskt genererad och anpassad för denna kund.',
    btnExportHtml: '🌐 Exportera HTML',
    btnExportMd: '📄 Exportera Markdown',
    btnReset: '🔄 Återställ',
    docTitle: 'Icke-funktionell Kravspecifikation',
    docFor: 'Framtagen för',
    docAssessor: 'Bedömare',
    docDate: 'Datum',
    noRows: 'Inga krav tillagda än.',
    placeholderRequirement: 't.ex. API-svarstid',
    placeholderTarget: 't.ex. p99 < 200ms',
  },
};

let lang = localStorage.getItem('aoa_lang') || 'en';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : (STRINGS.en[key] !== undefined ? STRINGS.en[key] : key); }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let rows = [];
let nextId = 1;

function setLang(l) { lang = l; localStorage.setItem('aoa_lang', l); document.getElementById('langSelect').value = l; applyI18n(); renderMatrix(); renderPreview(); save(); }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.title = t('heroTitle') + ' — Phase 3';
  document.getElementById('sopList').innerHTML = t('sop').map(s => `<li>${esc(s)}</li>`).join('');
}

function fieldEls() { return Array.from(document.querySelectorAll('[data-eng]')); }
function collectFields() { const o = {}; fieldEls().forEach(el => { o[el.getAttribute('data-eng')] = el.value; }); return o; }
function restoreFields(o) { fieldEls().forEach(el => { const k = el.getAttribute('data-eng'); if (o[k] !== undefined) el.value = o[k]; }); }
function val(k) { const el = document.querySelector(`[data-eng="${k}"]`); return el ? el.value : ''; }

let savedTimer;
function save() { try { localStorage.setItem(KEY, JSON.stringify({ fields: collectFields(), rows, nextId, lang })); flashSaved(); } catch (e) {} }
function flashSaved() { const f = document.getElementById('savedFlag'); f.textContent = '✓'; clearTimeout(savedTimer); savedTimer = setTimeout(() => { f.textContent = ''; }, 1200); }
function loadSaved() {
  try {
    const o = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (o.fields) restoreFields(o.fields);
    if (o.rows) rows = o.rows;
    if (o.nextId) nextId = o.nextId;
  } catch (e) {}
}

function addRow() { rows.push({ id: nextId++, category: CATEGORIES[0], requirement: '', target: '', priority: 'should' }); renderMatrix(); renderPreview(); save(); }
function removeRow(id) { rows = rows.filter(r => r.id !== id); renderMatrix(); renderPreview(); save(); }
function updateRow(id, field, value) { const r = rows.find(r => r.id === id); if (r) r[field] = value; renderPreview(); save(); if (field === 'priority' || field === 'category') renderMatrix(); }

function renderMatrix() {
  const body = document.getElementById('matrixBody');
  if (!rows.length) { body.innerHTML = `<tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:14px 8px">${esc(t('noRows'))}</td></tr>`; return; }
  body.innerHTML = rows.map(r => `<tr>
    <td><select onchange="updateRow(${r.id},'category',this.value)">${CATEGORIES.map(c => `<option value="${c}" ${r.category===c?'selected':''}>${c}</option>`).join('')}</select></td>
    <td><input type="text" value="${esc(r.requirement)}" placeholder="${esc(t('placeholderRequirement'))}" oninput="updateRow(${r.id},'requirement',this.value)"></td>
    <td><input type="text" value="${esc(r.target)}" placeholder="${esc(t('placeholderTarget'))}" oninput="updateRow(${r.id},'target',this.value)"></td>
    <td><select onchange="updateRow(${r.id},'priority',this.value)">${Object.entries(PRIORITIES).map(([v,k]) => `<option value="${v}" ${r.priority===v?'selected':''}>${esc(t(k))}</option>`).join('')}</select></td>
    <td><button class="rm-btn" onclick="removeRow(${r.id})">✕</button></td>
  </tr>`).join('');
}

function renderPreview() {
  const date = new Date().toISOString().slice(0, 10);
  const filled = rows.filter(r => r.requirement.trim());
  let h = `<div class="meta"><strong>${esc(t('docFor'))}:</strong> ${esc(val('client')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docAssessor'))}:</strong> ${esc(val('assessor')) || '—'} &nbsp;·&nbsp; <strong>${esc(t('docDate'))}:</strong> ${date}</div>`;
  if (filled.length) {
    h += `<table><thead><tr><th>${esc(t('colCategory'))}</th><th>${esc(t('colRequirement'))}</th><th>${esc(t('colTarget'))}</th><th>${esc(t('colPriority'))}</th></tr></thead><tbody>`;
    h += filled.map(r => `<tr><td>${esc(r.category)}</td><td>${esc(r.requirement)}</td><td>${esc(r.target)}</td><td><span class="prio-badge prio-${r.priority}">${esc(t(PRIORITIES[r.priority]))}</span></td></tr>`).join('');
    h += '</tbody></table>';
  } else { h += `<p><em>${esc(t('noRows'))}</em></p>`; }
  document.getElementById('preview').innerHTML = h;
}

document.addEventListener('input', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });
document.addEventListener('change', e => { if (e.target.matches('[data-eng]')) { renderPreview(); save(); } });

function resetAll() {
  if (!confirm('Clear all fields? / Ryd alle felter? / Rensa alla fält?')) return;
  fieldEls().forEach(el => { el.value = ''; });
  rows = []; nextId = 1;
  renderMatrix(); renderPreview(); save();
}

function slug() { return (val('client') || 'nfr_spec').replace(/\W+/g, '_'); }
function docMarkdown() {
  const date = new Date().toISOString().slice(0, 10);
  const filled = rows.filter(r => r.requirement.trim());
  let m = `# ${t('docTitle')} — ${val('client') || '[client]'}\n\n`;
  m += `**${t('docFor')}:** ${val('client') || '—'}  \n**${t('docAssessor')}:** ${val('assessor') || '—'}  \n**${t('docDate')}:** ${date}\n\n`;
  if (filled.length) {
    m += `| ${t('colCategory')} | ${t('colRequirement')} | ${t('colTarget')} | ${t('colPriority')} |\n|---|---|---|---|\n`;
    m += filled.map(r => `| ${r.category} | ${r.requirement} | ${r.target} | ${t(PRIORITIES[r.priority])} |`).join('\n') + '\n';
  } else { m += `${t('noRows')}\n`; }
  return m;
}
function docHtml() {
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + esc(t('docTitle')) + ' — ' + esc(val('client') || 'client') + '</title>'
    + '<style>body{font-family:Inter,Segoe UI,sans-serif;color:#1c1c28;max-width:880px;margin:40px auto;padding:0 22px;line-height:1.6}'
    + 'h1{color:#1B1474;font-family:Georgia,serif}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border:1px solid #e4e4f0;padding:7px 10px;text-align:left}th{background:#EEEEFA;color:#1B1474}</style></head><body>'
    + document.getElementById('preview').outerHTML.replace('id="preview"', '')
    + '</body></html>';
}
function download(text, fname, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname; a.click();
  URL.revokeObjectURL(a.href);
}
function exportDoc(fmt) {
  if (fmt === 'md') download(docMarkdown(), 'nfr_spec_' + slug() + '.md', 'text/markdown');
  else download(docHtml(), 'nfr_spec_' + slug() + '.html', 'text/html');
}

(function init() {
  document.getElementById('langSelect').value = lang;
  loadSaved();
  applyI18n();
  if (!rows.length) { rows.push({ id: nextId++, category: CATEGORIES[0], requirement: '', target: '', priority: 'should' }); }
  renderMatrix();
  renderPreview();
})();
</script>
</body>
</html>
