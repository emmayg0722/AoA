<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Readiness Assessment (5C) — Console</title>
<meta name="description" content="A workspace that walks the four-step 5C data-readiness assessment: generate prompts for the dra-5c agent, paste results back, profile a data sample locally, and assemble a 5C scorecard report.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231B1474'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B1474; --primary-dark: #120D52; --accent: #DCDDF6; --powder: #EEEEFA;
    --ink: #1c1c28; --muted: #5b5b6b; --line: #e4e4f0;
    --green: #1a8a5c; --amber: #d4790e; --red: #c0392b;
    --font-heading: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--ink); background: #fafaff; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 44px 24px 36px; }
  .wrap { max-width: 920px; margin: 0 auto; }
  .crumb { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  select#langSelect { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; padding: 7px 10px; }
  select#langSelect option { color: var(--ink); }
  .hero h1 { font-family: var(--font-heading); font-weight: 700; font-size: 34px; line-height: 1.15; }
  .hero p { margin-top: 10px; font-size: 15.5px; color: #dcdcf2; max-width: 660px; }
  main { max-width: 920px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 26px; }
  .note strong { color: var(--primary); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .step-no { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; color: var(--primary); background: var(--accent); padding: 3px 9px; border-radius: 20px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 12px 0 5px; }
  input[type=text], textarea, select {
    width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff;
  }
  textarea { resize: vertical; min-height: 90px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .copilot-box { border: 1px solid var(--accent); background: #fbfbff; border-radius: 12px; padding: 14px 16px; margin: 14px 0 18px; }
  .copilot-head { font-weight: 600; font-size: 14px; color: var(--primary); }
  .prompt-box { position: relative; margin-top: 12px; display: none; }
  pre.prompt { background: #f5f5fc; border: 1px solid var(--line); border-radius: 10px; padding: 14px 14px; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #2a2a3a; max-height: 320px; overflow: auto; }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 4px 16px; margin-top: 12px; background: #fcfcff; font-size: 14px; }
  .preview .empty { color: #aaa; font-style: italic; }
  .preview h2, .preview h3, .preview h4, .preview h5 { font-family: var(--font-heading); color: var(--primary); margin: 14px 0 6px; }
  .preview h2 { font-size: 19px; } .preview h3 { font-size: 16px; } .preview h4 { font-size: 14.5px; }
  .preview p { margin: 8px 0; } .preview ul, .preview ol { margin: 8px 0 8px 22px; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
  .preview th, .preview td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; vertical-align: top; }
  .preview th { background: var(--powder); color: var(--primary); }
  .preview code { background: #ececf6; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  .preview pre { background: #f5f5fc; border: 1px solid var(--line); border-radius: 8px; padding: 12px; overflow: auto; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; margin: 10px 0; }
  .pill-link { display: inline-block; font-size: 13.5px; font-weight: 600; color: var(--primary); background: var(--accent); padding: 8px 14px; border-radius: 8px; text-decoration: none; }
  .pill-link:hover { background: #C3C5EC; }
  .sc-grid { display: grid; grid-template-columns: 1.4fr 0.7fr 2fr; gap: 8px 14px; align-items: center; margin-top: 6px; }
  .sc-grid .h { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .sc-grid .c { font-weight: 600; color: var(--primary); }
  .saved { font-size: 12.5px; color: var(--green); margin-left: auto; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  @media (max-width: 680px) { .grid2, .sc-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 27px; } }
</style>
</head>
<body>
  <header class="hero"><div class="wrap">
    <div class="hero-top">
      <div class="crumb"><a href="../../">AI Architect Toolkit</a> · Phase 1 · Data Readiness Assessment (5C)</div>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="sv">Svenska</option>
      </select>
    </div>
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroDesc"></p>
  </div></header>

  <main>
    <div class="note">
      <strong data-i18n="noteLabel"></strong> <span data-i18n="noteBody"></span>
    </div>

    <!-- Setup -->
    <div class="card">
      <h2><span class="step-no" data-i18n="stepSetup"></span> <span data-i18n="setupTitle"></span> <span class="saved" id="savedFlag"></span></h2>
      <p class="hint" data-i18n="setupHint"></p>
      <div class="grid2">
        <div><label data-i18n="lblClient"></label><input type="text" data-eng="client" placeholder="Acme Corp"></div>
        <div><label data-i18n="lblAssessor"></label><input type="text" data-eng="assessor" placeholder="Your name"></div>
      </div>
      <label data-i18n="lblUseCase"></label>
      <input type="text" data-eng="useCase" placeholder="Real-time credit-risk scoring at loan application">
      <label data-i18n="lblPredicts"></label>
      <input type="text" data-eng="predicts" placeholder="Approve/deny + risk band, returned synchronously at submit">
      <div class="grid2">
        <div><label data-i18n="lblLatency"></label><input type="text" data-eng="latency" placeholder="&lt; 200 ms p99"></div>
        <div><label data-i18n="lblVolume"></label><input type="text" data-eng="volume" placeholder="~50k applications/day, bursty"></div>
        <div><label data-i18n="lblHistory"></label><input type="text" data-eng="history" placeholder="3+ years labelled outcomes"></div>
        <div><label data-i18n="lblEntities"></label><input type="text" data-eng="entities" placeholder="applicant, bureau pull, transactions, prior loans"></div>
      </div>
    </div>

    <!-- Step A -->
    <div class="card">
      <h2><span class="step-no" data-i18n="stepA"></span> <span data-i18n="stepATitle"></span></h2>
      <p class="hint" data-i18n="stepAHint"></p>

      <div class="copilot-box">
        <div class="copilot-head" data-i18n="copilotHeadA"></div>
        <p class="hint" data-i18n="copilotHintA"></p>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="genCopilot('A')" data-i18n="btnGenCopilot"></button>
        </div>
        <div class="prompt-box" id="pbc_A"><pre class="prompt" id="ptc_A"></pre>
          <div class="btn-row"><button class="btn btn-secondary" onclick="copyCopilot('A')" data-i18n="btnCopyCopilot"></button></div></div>
        <label data-i18n="lblCopilotFindings"></label>
        <textarea data-eng="copA" placeholder="Paste the summaries + citations Copilot returned…"></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="genPrompt('A')" data-i18n="btnGenA"></button>
      </div>
      <div class="prompt-box" id="pb_A"><pre class="prompt" id="pt_A"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyPrompt('A')" data-i18n="btnCopyPrompt"></button></div></div>
      <label data-i18n="lblPasteOutput"></label>
      <textarea data-eng="outA" data-prev="A" placeholder="Paste the interview guide the agent produced…"></textarea>
      <div class="preview" id="prev_A"></div>
    </div>

    <!-- Step B -->
    <div class="card">
      <h2><span class="step-no" data-i18n="stepB"></span> <span data-i18n="stepBTitle"></span></h2>
      <p class="hint" data-i18n="stepBHint"></p>

      <div class="copilot-box">
        <div class="copilot-head" data-i18n="copilotHeadB"></div>
        <p class="hint" data-i18n="copilotHintB"></p>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="genCopilot('B')" data-i18n="btnGenCopilot"></button>
        </div>
        <div class="prompt-box" id="pbc_B"><pre class="prompt" id="ptc_B"></pre>
          <div class="btn-row"><button class="btn btn-secondary" onclick="copyCopilot('B')" data-i18n="btnCopyCopilot"></button></div></div>
        <label data-i18n="lblCopilotFindings"></label>
        <textarea data-eng="copB" placeholder="Paste the documents + locations + citations Copilot returned…"></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="genPrompt('B')" data-i18n="btnGenB"></button>
      </div>
      <div class="prompt-box" id="pb_B"><pre class="prompt" id="pt_B"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyPrompt('B')" data-i18n="btnCopyPrompt"></button></div></div>
      <label data-i18n="lblPasteOutput"></label>
      <textarea data-eng="outB" data-prev="B" placeholder="Paste the document-review checklist…"></textarea>
      <div class="preview" id="prev_B"></div>
    </div>

    <!-- Step C -->
    <div class="card">
      <h2><span class="step-no" data-i18n="stepC"></span> <span data-i18n="stepCTitle"></span></h2>
      <p class="hint" data-i18n="stepCHint"></p>
      <div class="btn-row"><a class="pill-link" href="profiler.html" target="_blank" rel="noopener" data-i18n="btnOpenProfiler"></a></div>
      <label data-i18n="lblProfilerSummary"></label>
      <textarea data-eng="cSummary" placeholder="Paste the 'aggregate summary' block from the profiler here…"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="genPrompt('C')" data-i18n="btnGenC"></button>
      </div>
      <div class="prompt-box" id="pb_C"><pre class="prompt" id="pt_C"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyPrompt('C')" data-i18n="btnCopyPrompt"></button></div></div>
      <label data-i18n="lblPasteOutput"></label>
      <textarea data-eng="outC" data-prev="C" placeholder="Paste the Coverage/Credibility interpretation + sub-scores…"></textarea>
      <div class="preview" id="prev_C"></div>
    </div>

    <!-- Step D -->
    <div class="card">
      <h2><span class="step-no" data-i18n="stepD"></span> <span data-i18n="stepDTitle"></span></h2>
      <p class="hint" data-i18n="stepDHint"></p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="genPrompt('D')" data-i18n="btnGenD"></button>
      </div>
      <div class="prompt-box" id="pb_D"><pre class="prompt" id="pt_D"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyPrompt('D')" data-i18n="btnCopyPrompt"></button></div></div>
      <label data-i18n="lblPasteOutput"></label>
      <textarea data-eng="outD" data-prev="D" placeholder="Paste the validation plan + scorecard…"></textarea>
      <div class="preview" id="prev_D"></div>

      <label style="margin-top:18px" data-i18n="lblFinalScores"></label>
      <div class="sc-grid">
        <div class="h" data-i18n="colDimension"></div><div class="h" data-i18n="colScore"></div><div class="h" data-i18n="colNote"></div>
        <div class="c" data-i18n="cContext"></div><div><select data-eng="sc_context"></select></div><div><input type="text" data-eng="note_context" placeholder="evidence / gap"></div>
        <div class="c" data-i18n="cClarity"></div><div><select data-eng="sc_clarity"></select></div><div><input type="text" data-eng="note_clarity" placeholder="evidence / gap"></div>
        <div class="c" data-i18n="cCoverage"></div><div><select data-eng="sc_coverage"></select></div><div><input type="text" data-eng="note_coverage" placeholder="evidence / gap"></div>
        <div class="c" data-i18n="cCredibility"></div><div><select data-eng="sc_credibility"></select></div><div><input type="text" data-eng="note_credibility" placeholder="evidence / gap"></div>
        <div class="c" data-i18n="cCapacity"></div><div><select data-eng="sc_capacity"></select></div><div><input type="text" data-eng="note_capacity" placeholder="evidence / gap"></div>
      </div>
      <div class="grid2">
        <div><label data-i18n="lblVerdict"></label><select data-eng="verdict">
          <option value="">—</option><option value="Ready" data-i18n-opt="verdictReady"></option><option value="Conditional" data-i18n-opt="verdictConditional"></option><option value="Not ready" data-i18n-opt="verdictNotReady"></option></select></div>
        <div><label data-i18n="lblNextAction"></label><input type="text" data-eng="nextAction" placeholder="Proceed to PoC / remediate X first"></div>
      </div>
      <label data-i18n="lblGaps"></label>
      <input type="text" data-eng="gaps" placeholder="1) … 2) … 3) …">
    </div>

    <!-- Report -->
    <div class="card">
      <h2 data-i18n="assembleTitle"></h2>
      <p class="hint" data-i18n="assembleHint"></p>
      <div class="toolbar">
        <button class="btn btn-primary" onclick="exportReport('html')" data-i18n="btnExportHtml"></button>
        <button class="btn btn-primary" onclick="exportReport('md')" data-i18n="btnExportMd"></button>
        <button class="btn btn-secondary" onclick="exportEngagement()" data-i18n="btnSaveEngagement"></button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" data-i18n="btnLoadEngagement"></button>
        <button class="btn btn-secondary" onclick="loadSampleEngagement()" data-i18n="btnLoadSample"></button>
        <button class="btn btn-secondary" onclick="resetEngagement()" data-i18n="btnResetEngagement"></button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      <div id="sampleError" style="display:none;color:var(--red);font-size:12.5px;margin-top:8px"></div>
    </div>
  </main>

<script>

// ════════════════════════════════════════════════════════════════

function val(k) { const el = document.querySelector('[data-eng="'+k+'"]'); return el ? el.value.trim() : ''; }

function collect() {
  const o = {};
  FIELDS().forEach(el => { o[el.getAttribute('data-eng')] = el.value; });
  return o;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(collect())); flashSaved(); } catch (e) {}
}
function restore(o) {
  FIELDS().forEach(el => {
    const k = el.getAttribute('data-eng');
    if (o[k] !== undefined) el.value = o[k];
  });
  ['A','B','C','D'].forEach(renderPreview);
}
let savedTimer;
function flashSaved() {
  const f = document.getElementById('savedFlag');
  f.textContent = t('savedFlag');
  clearTimeout(savedTimer);
  savedTimer = setTimeout(() => { f.textContent = ''; }, 1200);
}

// wire inputs: autosave + live preview
document.addEventListener('input', e => {
  if (!e.target.matches('[data-eng]')) return;
  save();
  const pv = e.target.getAttribute('data-prev');
  if (pv) renderPreview(pv);
});

// ── Minimal Markdown renderer (headings, bold, code, lists, tables) ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s) { return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>'); }
function splitRow(line) { return line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c => c.trim()); }
function mdToHtml(md) {
  if (!md || !md.trim()) return '<p class="empty">' + esc(t('nothingPasted')) + '</p>';
  const L = md.replace(/\r/g,'').split('\n');
  let html = '', i = 0;
  while (i < L.length) {
    const line = L[i];
    if (/^\s*$/.test(line)) { i++; continue; }
    // fenced code block
    if (/^```/.test(line.trim())) {
      i++; const buf = [];
      while (i < L.length && !/^```/.test(L[i].trim())) { buf.push(L[i]); i++; }
      i++; // skip closing fence
      html += '<pre>' + esc(buf.join('\n')) + '</pre>';
      continue;
    }
    // table
    if (line.includes('|') && i+1 < L.length && /-/.test(L[i+1]) && /^[\s:|-]+$/.test(L[i+1].trim())) {
      const head = splitRow(line); i += 2; const body = [];
      while (i < L.length && L[i].includes('|') && L[i].trim() !== '') { body.push(splitRow(L[i])); i++; }
      html += '<table><thead><tr>' + head.map(h => '<th>'+inlineMd(h)+'</th>').join('') + '</tr></thead><tbody>'
            + body.map(r => '<tr>'+r.map(c => '<td>'+inlineMd(c)+'</td>').join('')+'</tr>').join('') + '</tbody></table>';
      continue;
    }
    let m;
    if (m = line.match(/^(#{1,4})\s+(.*)/)) { const lv = m[1].length + 1; html += '<h'+lv+'>'+inlineMd(m[2])+'</h'+lv+'>'; i++; continue; }
    if (/^\s*[-*]\s+/.test(line)) { const it = []; while (i<L.length && /^\s*[-*]\s+/.test(L[i])) { it.push(L[i].replace(/^\s*[-*]\s+/,'')); i++; } html += '<ul>'+it.map(x=>'<li>'+inlineMd(x)+'</li>').join('')+'</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { const it = []; while (i<L.length && /^\s*\d+\.\s+/.test(L[i])) { it.push(L[i].replace(/^\s*\d+\.\s+/,'')); i++; } html += '<ol>'+it.map(x=>'<li>'+inlineMd(x)+'</li>').join('')+'</ol>'; continue; }
    const para = [line]; i++;
    while (i<L.length && !/^\s*$/.test(L[i]) && !/^(#{1,4}\s|[-*]\s|\d+\.\s)/.test(L[i]) && !L[i].includes('|')) { para.push(L[i]); i++; }
    html += '<p>'+inlineMd(para.join(' '))+'</p>';
  }
  return html;
}
function renderPreview(step) {
  document.getElementById('prev_' + step).innerHTML = mdToHtml(val('out' + step));
}

  const Cs = [[t('cContext'),'context'],[t('cClarity'),'clarity'],[t('cCoverage'),'coverage'],[t('cCredibility'),'credibility'],[t('cCapacity'),'capacity']];
  let m = `\n| ${t('tblC')} | ${t('tblScore')} | ${t('tblNote')} |\n|---|:--:|---|\n`;
  Cs.forEach(([lab,k]) => { m += '| '+lab+' | '+(val('sc_'+k)||'—')+' | '+(val('note_'+k)||'')+' |\n'; });

  m += `**${t('scNextAction')}:** ` + (val('nextAction')||'—') + '\n';
  return m;
}

function download(text, fname, mime) {
  const blob = new Blob([text], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fname; a.click();
  URL.revokeObjectURL(a.href);
}
function slug() { return (val('client')||'engagement').replace(/\W+/g,'_'); }
function exportReport(fmt) {
  if (fmt === 'md') download(reportMarkdown(), 'DRA5C_'+slug()+'.md', 'text/markdown');
  else download(reportHtml(), 'DRA5C_'+slug()+'.html', 'text/html');
}
function exportEngagement() { download(JSON.stringify(collect(), null, 2), 'DRA5C_'+slug()+'.json', 'application/json'); }
function loadSampleEngagement() {
  const errEl = document.getElementById('sampleError');
  errEl.style.display = 'none';
  fetch('../sample-data/data-readiness-assessment-5c/sample-engagement.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(o => { restore(o); save(); })
    .catch(err => {
      errEl.textContent = t('sampleLoadError')(err.message);
      errEl.style.display = 'block';
    });
}
function resetEngagement() {
  if (!confirm(t('resetConfirm'))) return;
  FIELDS().forEach(el => { el.value = ''; });
  ['A','B','C','D'].forEach(renderPreview);
  save();
}
document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = () => { try { restore(JSON.parse(r.result)); save(); } catch (err) { alert(t('invalidFile')); } };
  r.readAsText(file);
  e.target.value = '';
});

// ── Boot ─────────────────────────────────────────────────────────
// ── Shared engagement profile (site-wide prefill of client/assessor/use case) ──
const ENG_KEY = 'aoa_engagement_v1';
const ENG_FIELDS = ['client', 'assessor', 'useCase'];
function prefillEngagement() {
  try {
    const eng = JSON.parse(localStorage.getItem(ENG_KEY) || '{}');
    ENG_FIELDS.forEach(k => {
      const el = document.querySelector('[data-eng="' + k + '"]');
      if (el && !el.value && eng[k]) el.value = eng[k];
    });
  } catch (e) {}
}
document.addEventListener('input', e => {
  const k = e.target.getAttribute && e.target.getAttribute('data-eng');
  if (!k || ENG_FIELDS.indexOf(k) === -1 || !e.target.value) return;
  try {
    const eng = JSON.parse(localStorage.getItem(ENG_KEY) || '{}');
    eng[k] = e.target.value;
    localStorage.setItem(ENG_KEY, JSON.stringify(eng));
  } catch (e2) {}
});

(function init() {
  document.getElementById('langSelect').value = lang;
  applyI18n();
  try { const o = JSON.parse(localStorage.getItem(KEY) || '{}'); restore(o); } catch (e) {}
  prefillEngagement();
  ['A','B','C','D'].forEach(renderPreview);
})();
</script>
