<style>
  :root {
    --primary: #1B1474; --primary-dark: #120D52; --accent: #DCDDF6; --powder: #EEEEFA;

  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); color: var(--ink); background: #fafaff; line-height: 1.6; }
  .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 44px 24px 36px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .crumb { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .crumb a { color: var(--accent); text-decoration: none; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .hero h1 { font-family: var(--font-heading); font-weight: 700; font-size: 34px; line-height: 1.15; }
  .hero p { margin-top: 10px; font-size: 15.5px; color: #dcdcf2; max-width: 680px; }
  select#langSelect { font-family: var(--font-body); font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; padding: 7px 10px; }
  select#langSelect option { color: var(--ink); }
  main { max-width: 1000px; margin: 0 auto; padding: 28px 24px 80px; }
  .note { background: var(--powder); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--muted); margin-bottom: 26px; }
  .note strong { color: var(--primary); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; }
  .card > h2 { font-family: var(--font-heading); font-weight: 600; font-size: 21px; color: var(--primary); margin-bottom: 4px; }
  .card .hint { font-size: 13.5px; color: var(--muted); margin-bottom: 14px; }
  ol.sop { margin-left: 20px; }
  ol.sop li { margin-bottom: 10px; font-size: 14px; }
  ol.sop li.done > label.sop-step > span { text-decoration: line-through; color: var(--muted); }
  label.sop-step { display: flex; gap: 9px; align-items: flex-start; font-weight: 400; margin: 0; cursor: pointer; font-size: 14px; color: var(--ink); }
  label.sop-step input { width: auto; margin-top: 4px; flex: none; }
  ol.sop li strong { color: var(--primary); }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 10px 0 5px; }
  input[type=text], textarea, select.field { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,20,116,0.12); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: var(--primary); }
  .btn-primary:hover { background: #C3C5EC; }
  .btn-secondary { background: #fff; color: var(--primary); border: 1.5px solid var(--accent); }
  .btn-secondary:hover { background: var(--powder); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .preview { border: 1px dashed var(--line); border-radius: 10px; padding: 18px 20px; background: #fcfcff; font-size: 14px; }
  .preview h3 { font-family: var(--font-heading); color: var(--primary); font-size: 16px; margin: 14px 0 6px; }
  .preview h3:first-child { margin-top: 0; }
  .preview p { margin: 6px 0; white-space: pre-wrap; }
  .preview .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .rubric-grid { display: grid; grid-template-columns: 1.6fr 0.6fr; gap: 8px 14px; align-items: center; margin-top: 6px; }
  .rubric-grid .rh { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .rubric-grid select.rub { width: 100%; font-family: var(--font-body); font-size: 14px; color: var(--ink); border: 1.5px solid var(--line); border-radius: 8px; padding: 7px 9px; background: #fff; }
  .verdict-banner { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; margin-top: 14px; font-size: 14px; }
  .verdict-banner .vscore { font-family: var(--font-heading); font-size: 24px; font-weight: 700; }
  .verdict-ready { background: #e7f5ee; color: var(--green); }
  .verdict-conditional { background: #fdf3e3; color: var(--amber); }
  .verdict-notready { background: #fbeaea; color: var(--red); }
  .prompt-box { display: none; margin-top: 12px; }
  pre.prompt { background: #f5f5fc; border: 1px solid var(--line); border-radius: 10px; padding: 14px; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #2a2a3a; max-height: 320px; overflow: auto; }
  .preview h2 { font-family: var(--font-heading); color: var(--primary); font-size: 18px; margin: 16px 0 6px; }
  .preview h4, .preview h5 { font-family: var(--font-heading); color: var(--primary); margin: 12px 0 4px; }
  .preview ul, .preview ol { margin: 8px 0 8px 22px; }
  .preview code { background: #ececf6; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
  .preview pre { background: #f5f5fc; border: 1px solid var(--line); border-radius: 8px; padding: 12px; overflow: auto; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; margin: 10px 0; }
  .preview table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
  .preview th, .preview td { border: 1px solid var(--line); padding: 6px 9px; text-align: left; vertical-align: top; }
  .preview th { background: var(--powder); color: var(--primary); }
  textarea[data-eng="draftDoc"] { min-height: 110px; }
  .saved { font-size: 12.5px; color: var(--green); margin-left: 8px; }
  @media (max-width: 680px) { .grid2 { grid-template-columns: 1fr; } .hero h1 { font-size: 27px; } }
</style>
</head>
<body>
  <header class="hero"><div class="wrap">
    <div class="hero-top">
      <div class="crumb"><a href="../">AI Architect Toolkit</a> · Phase 1 · Discovery &amp; Assessment</div>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="sv">Svenska</option>
      </select>
    </div>
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroDesc"></p>
  </div></header>

  <main>
    <div class="note"><strong data-i18n="noteLabel"></strong> <span data-i18n="noteBody"></span></div>

    <div class="card">
      <h2 data-i18n="sopTitle"></h2>
      <p class="hint" data-i18n="sopHint"></p>
      <ol class="sop" id="sopList"></ol>
      <p class="hint" id="sopProgress" style="margin:8px 0 0"></p>
    </div>

    <div class="card">
      <h2 data-i18n="intakeTitle"></h2>
      <p class="hint" data-i18n="intakeHint"></p>
      <div class="grid2">
        <div><label data-i18n="lblClient"></label><input type="text" data-eng="client" placeholder="Acme Corp"></div>
        <div><label data-i18n="lblAssessor"></label><input type="text" data-eng="assessor"></div>
      </div>
      <label data-i18n="lblUseCase"></label>
      <input type="text" data-eng="useCase" placeholder="Real-time credit-risk scoring">
      <div class="grid2">
        <div><label data-i18n="lblCloud"></label><input type="text" data-eng="cloudProvider" placeholder="Azure, on-prem VMware"></div>
        <div><label data-i18n="lblCerts"></label><input type="text" data-eng="certifications" placeholder="SOC 2, ISO 27001"></div>
      </div>
      <label data-i18n="lblStackNotes"></label>
      <textarea data-eng="stackNotes"></textarea>
      <label data-i18n="lblCloudNotes"></label>
      <textarea data-eng="cloudCapNotes"></textarea>
      <label data-i18n="lblIntegrationNotes"></label>
      <textarea data-eng="integrationNotes"></textarea>
      <label data-i18n="lblSecurityNotes"></label>
      <textarea data-eng="securityNotes"></textarea>
      <label data-i18n="lblRecommendations"></label>
      <textarea data-eng="recommendations"></textarea>
      <label data-i18n="lblVerdict"></label>
      <select class="field" data-eng="verdict">
        <option value="">—</option>
        <option data-i18n-opt="verdictReady" value="ready"></option>
        <option data-i18n-opt="verdictConditional" value="conditional"></option>
        <option data-i18n-opt="verdictNotReady" value="notready"></option>
      </select>
    </div>

    <div class="card">
      <h2 data-i18n="rubricTitle"></h2>
      <p class="hint" data-i18n="rubricHint"></p>
      <div class="rubric-grid">
        <div class="rh" data-i18n="rubricColDim"></div><div class="rh" data-i18n="rubricColScore"></div>
        <div data-i18n="lblStackNotes"></div><div><select class="rub" data-eng="score_stack"><option value="">—</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
        <div data-i18n="lblCloudNotes"></div><div><select class="rub" data-eng="score_cloud"><option value="">—</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
        <div data-i18n="lblIntegrationNotes"></div><div><select class="rub" data-eng="score_integration"><option value="">—</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
        <div data-i18n="lblSecurityNotes"></div><div><select class="rub" data-eng="score_security"><option value="">—</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
      </div>
      <div class="verdict-banner" id="rubricBanner" style="display:none"><div class="vscore" id="rubricScoreEl"></div><div id="rubricVerdictEl"></div></div>
    </div>

    <div class="card">
      <h2 data-i18n="draftTitle"></h2>
      <p class="hint" data-i18n="draftHint"></p>
      <div class="btn-row"><button class="btn btn-primary" onclick="genDraftPrompt()" data-i18n="btnGenDraft"></button></div>
      <div class="prompt-box" id="pbDraft"><pre class="prompt" id="ptDraft"></pre>
        <div class="btn-row"><button class="btn btn-secondary" onclick="copyDraftPrompt()" data-i18n="btnCopyDraft"></button></div></div>
      <label data-i18n="lblDraftDoc"></label>
      <textarea data-eng="draftDoc" placeholder="Paste the Markdown document the agent drafted&#8230;"></textarea>
    </div>

    <div class="card">
      <h2 data-i18n="previewTitle"></h2>
      <p class="hint" data-i18n="previewHint"></p>
      <div class="preview" id="preview"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportDoc('html')" data-i18n="btnExportHtml"></button>
        <button class="btn btn-primary" onclick="exportDoc('md')" data-i18n="btnExportMd"></button>
        <button class="btn btn-secondary" onclick="resetAll()" data-i18n="btnReset"></button>
        <button class="btn btn-secondary" onclick="loadSample()" data-i18n="btnLoadSample"></button>
        <span class="saved" id="savedFlag"></span>
      </div>
      <div id="sampleError" style="display:none;color:var(--red);font-size:12.5px;margin-top:8px"></div>
    </div>
  </main>

function _mdInline(s) { return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>'); }
function _mdRow(line) { return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim()); }
function mdToHtml(md) {
  if (!md || !md.trim()) return '';
  const L = md.replace(/\r/g, '').split('\n');
  let html = '', i = 0;
  while (i < L.length) {
    const line = L[i];
    if (/^\s*$/.test(line)) { i++; continue; }
    if (/^```/.test(line.trim())) {
      i++; const buf = [];
      while (i < L.length && !/^```/.test(L[i].trim())) { buf.push(L[i]); i++; }
      i++;
      html += '<pre>' + esc(buf.join('\n')) + '</pre>';
      continue;
    }
    if (line.includes('|') && i + 1 < L.length && /-/.test(L[i + 1]) && /^[\s:|-]+$/.test(L[i + 1].trim())) {
      const head = _mdRow(line); i += 2; const body = [];
      while (i < L.length && L[i].includes('|') && L[i].trim() !== '') { body.push(_mdRow(L[i])); i++; }
      html += '<table><thead><tr>' + head.map(h => '<th>' + _mdInline(h) + '</th>').join('') + '</tr></thead><tbody>'
            + body.map(r => '<tr>' + r.map(c => '<td>' + _mdInline(c) + '</td>').join('') + '</tr>').join('') + '</tbody></table>';
      continue;
    }
    let m;
    if (m = line.match(/^(#{1,4})\s+(.*)/)) { const lv = m[1].length + 1; html += '<h' + lv + '>' + _mdInline(m[2]) + '</h' + lv + '>'; i++; continue; }
    if (/^\s*[-*]\s+/.test(line)) { const it = []; while (i < L.length && /^\s*[-*]\s+/.test(L[i])) { it.push(L[i].replace(/^\s*[-*]\s+/, '')); i++; } html += '<ul>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)) { const it = []; while (i < L.length && /^\s*\d+\.\s+/.test(L[i])) { it.push(L[i].replace(/^\s*\d+\.\s+/, '')); i++; } html += '<ol>' + it.map(x => '<li>' + _mdInline(x) + '</li>').join('') + '</ol>'; continue; }
    const para = [line]; i++;
    while (i < L.length && !/^\s*$/.test(L[i]) && !/^(#{1,4}\s|[-*]\s|\d+\.\s)/.test(L[i]) && !L[i].includes('|')) { para.push(L[i]); i++; }
    html += '<p>' + _mdInline(para.join(' ')) + '</p>';
  }
  return html;
}

  const steps = t('sop');
  document.getElementById('sopList').innerHTML = steps.map((s, i) =>
    `<li class="${sopDone[i] ? 'done' : ''}"><label class="sop-step"><input type="checkbox" ${sopDone[i] ? 'checked' : ''} onchange="toggleSop(${i}, this.checked)"><span>${esc(s)}</span></label></li>`
  ).join('');
  const pl = document.getElementById('sopProgress');
  if (pl) pl.textContent = t('sopProgress')(sopDone.filter(Boolean).length, steps.length);
}
function toggleSop(i, v) { sopDone[i] = v; renderSop(); save(); }
const _sopSave = save;
save = function () {
  _sopSave();
  try {
    const o = JSON.parse(localStorage.getItem(KEY) || '{}');
    o.sopDone = sopDone;
    localStorage.setItem(KEY, JSON.stringify(o));
  } catch (e) {}
};
const _sopApplyI18n = applyI18n;
applyI18n = function () { _sopApplyI18n(); renderSop(); };
const SAMPLE_URL = '../sample-data/engagement-nordkap/infrastructure-audit.json';
function loadSample() {
  if (!confirm(t('sampleConfirm'))) return;
  const errEl = document.getElementById('sampleError');
  if (errEl) errEl.style.display = 'none';
  fetch(SAMPLE_URL)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(o => { localStorage.setItem(KEY, JSON.stringify(o)); location.reload(); })
    .catch(err => {
      if (errEl) { errEl.textContent = t('sampleLoadError2')(err.message); errEl.style.display = 'block'; }
    });
}

(function init() {
  document.getElementById('langSelect').value = lang;
  loadSaved();
  prefillEngagement();
  applyI18n();
  renderPreview();
})();
</script>
</body>
